<!DOCTYPE html>
<html lang="en" data-theme="default">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    const theme = localStorage.getItem("sg-theme");
    if (theme) document.documentElement.setAttribute("data-theme", theme);
  </script>
  <title>Contact</title>
  <link rel="stylesheet" href="./main.css" />
  <script type="module" src="./scripts/main.js"></script>
</head>
<body>

  <header>
    <nav>
      <a href="./index.html">SG</a>
      <ul>
        <li><a href="./index.html">About</a></li>
        <li><a href="./resume.html">Résumé</a></li>
        <li><a href="./projects.html">Projects</a></li>
        <li><a href="./contact.html" aria-current="page">Contact</a></li>
      </ul>
      <theme-picker></theme-picker>
    </nav>
  </header>

  <main>
    <h1>Get in Touch</h1>
    <p>
      I'm open to internship opportunities, research collaborations, or just a
      good conversation about software. Fill out the form below and I'll get
      back to you as soon as I can.
    </p>

    <form action="https://formspree.io/f/mzdwzoyd" method="POST">

        <p>
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" autocomplete="name" required />
        </p>

        <p>
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" autocomplete="email" required />
        </p>
    
        <p>
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" />
        </p>

        <p>
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" required></textarea>
        </p>
    
        <p hidden>
            <label for="gotcha">Leave this blank</label>
            <input type="text" id="gotcha" name="_gotcha" tabindex="-1" autocomplete="off" />
        </p>

        <button type="submit">Send Message</button>

        <p class="form-status" aria-live="polite"></p>
    
    </form>

  </main>

  <footer>
    <p>&copy; <time datetime="2026">2026</time> Santiago Guerrero - 
      <a href="https://github.com/santibanti">GitHub</a>
    </p>
  </footer>

  <script>
    const form = document.querySelector("form");
    const status = document.querySelector(".form-status");

    form.addEventListener("submit", async (event) => {
    event.preventDefault();

    status.textContent = "Sending...";

    const data = new FormData(form);

    try {
        const response = await fetch(form.action, {
        method: form.method,
        body: data,
        headers: {
            Accept: "application/json"
        }
        });

        if (response.ok) {
        form.reset();
        status.textContent = "Message sent successfully!";
        } else {
        status.textContent = "Something went wrong.";
        }
    } catch (error) {
        status.textContent = "Network error.";
    }
    });
  </script>

</body>
</html>
