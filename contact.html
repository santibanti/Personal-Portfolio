  <main>
    <h1>Get in Touch</h1>
    <p>
      I'm open to internship opportunities, research collaborations, or just a
      good conversation about software. Fill out the form below and I'll get
      back to you as soon as I can.
    </p>

    <!--
      ACTION: Replace "YOUR_FORM_ID" with your Formspree endpoint ID.
      Sign up at https://formspree.io, create a form, and paste the ID here.
      Format: https://formspree.io/f/YOUR_FORM_ID
      Works without JavaScript — Formspree handles the server-side redirect.

      novalidate is present so JavaScript can control validation UX,
      but native HTML5 attributes (required, type="email") remain as
      the baseline — they activate if JS fails to load.
    -->
    <form action="https://formspree.io/f/mzdwzoyd", method="POST">

        <p>
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" autocomplete="name" required />
        </p>

        <p>
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" autocomplete="email" required />
        </p>
    
        <p>
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" />
        </p>

        <p>
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" required></textarea>
        </p>
    
        <p hidden>
            <label for="gotcha">Leave this blank</label>
            <input type="text" id="gotcha" name="_gotcha" tabindex="-1" autocomplete="off" />
        </p>

        <button type="submit">Send Message</button>
    
    </form>

  </main>
